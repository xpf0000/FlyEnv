name: Build FlyEnv Windows Packages
on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'build/windows.build.yml'

permissions:
  actions: read
  contents: read

jobs:
  build-windows:
    if: github.ref == 'refs/heads/master'
    name: Build Windows Packages (x64)
    runs-on: windows-2022
    # Two release-signing requests may each wait for manual approval.
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          # 安装必要的构建工具
          choco install -y make

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'src/helper-go/go.mod'
          cache-dependency-path: 'src/helper-go/go.sum'

      - name: Cache node_modules and node-gyp
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            **/node_modules
            .yarn/cache
            ~/.cache/node-gyp
            ~\AppData\Local\node-gyp
          key: ${{ runner.os }}-x64-node-${{ hashFiles('**/package.json') }}

      - name: Install Yarn and build tools
        run: |
          npm install -g yarn node-gyp
          python -m pip install --upgrade pip

      - name: Install dependencies with Yarn
        run: |
          # Force link against WinRT runtime objects
          $env:LINK = "runtimeobject.lib"
          yarn install

      - name: Build Go helper with build-win.ps1
        run: |
          go install github.com/tc-hib/go-winres@latest
          $GOBIN = $(go env GOPATH) + "\bin"
          $env:PATH = "$GOBIN;$env:PATH"
          cd "$env:GITHUB_WORKSPACE/src/helper-go"
          go mod download
          go-winres make
          # 使用 PowerShell 脚本构建
          .\build-win.ps1

      # 第 1 阶段:编译并生成 win-unpacked。portable 目标会先把 elevate.exe 放入 app 目录,
      # 从而让它与 FlyEnv.exe / dll / node 扩展一起通过可信 GitHub Artifact 签名。
      - name: Build unsigned Windows application
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FLYENV_WINDOWS_BUILD_STAGE: app
        run: |
          cd "$env:GITHUB_WORKSPACE"
          yarn build

      - name: Collect unsigned application PE files
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE/scripts/windows-signpath-bundle.ps1" `
            -Mode Pack `
            -AppDir "$env:GITHUB_WORKSPACE/release/win-unpacked" `
            -BundleDir "$env:GITHUB_WORKSPACE/release/signpath-app-unsigned" `
            -ManifestPath "$env:GITHUB_WORKSPACE/release/signpath-app-manifest.json"

      - name: Upload unsigned application PE files
        id: upload-unsigned-app
        uses: actions/upload-artifact@v4
        with:
          name: FlyEnv-Windows-x64-app-unsigned
          path: release/signpath-app-unsigned
          if-no-files-found: error
          retention-days: 1

      - name: Sign application PE files with SignPath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: '4db4007d-ac9e-4889-a8d5-52d4a421d989'
          project-slug: 'FlyEnv'
          signing-policy-slug: 'release-signing'
          artifact-configuration-slug: 'windows-app'
          github-artifact-id: ${{ steps.upload-unsigned-app.outputs.artifact-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 1800
          output-artifact-directory: 'release/signpath-app-signed'

      - name: Apply signed application PE files
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE/scripts/windows-signpath-bundle.ps1" `
            -Mode Apply `
            -AppDir "$env:GITHUB_WORKSPACE/release/win-unpacked" `
            -BundleDir "$env:GITHUB_WORKSPACE/release/signpath-app-signed" `
            -ManifestPath "$env:GITHUB_WORKSPACE/release/signpath-app-manifest.json"

      # 第 2 阶段:使用已签名 app 目录生成安装包。NSIS 禁止复制 elevate.exe,
      # Portable 使用 useZip 直接打包预构建目录,避免覆盖第一阶段返回的有效签名。
      - name: Package signed Windows application
        env:
          FLYENV_WINDOWS_BUILD_STAGE: installers
          FLYENV_PREPACKAGED_APP_DIR: 'release/win-unpacked'
        run: |
          cd "$env:GITHUB_WORKSPACE"
          node electron/app-builder.mjs

      # 第 3 阶段:签外层安装包/便携版。
      - name: Upload unsigned artifacts (for signing)
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: FlyEnv-Windows-x64-unsigned
          path: |
            release/FlyEnv-Setup-*.exe
            release/FlyEnv-Portable-*.exe

      - name: Submit signing request to SignPath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: '4db4007d-ac9e-4889-a8d5-52d4a421d989'
          project-slug: 'FlyEnv'
          signing-policy-slug: 'release-signing'
          artifact-configuration-slug: 'windows-installer'
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 1800
          output-artifact-directory: 'release/signed'

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FlyEnv-Windows-x64
          path: |
            release/signed/*.exe
            release/*.msi
            release/*.yml
            release/*.blockmap
